<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Helpdesk Support</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        .status-dot.available { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-dot.busy { background-color: #ef4444; }
        /* Ensure modal is always on top */
        #loginModal { z-index: 9999 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-4">
        
        <!-- TOP NAVIGATION BAR -->
        <div class="mb-8 flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-3">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Current IT Status:</span>
                <div id="publicStatusDisplay" class="status-badge px-3 py-1 bg-slate-50 rounded-full border border-slate-100">
                    <div id="publicStatusDot" class="status-dot available"></div>
                    <span id="publicStatusText" class="font-bold text-green-700 text-sm">AVAILABLE</span>
                </div>
            </div>
            
            <!-- LOGIN BUTTON WITH EXPLICIT ONCLICK FOR TESTING -->
            <button id="adminLoginBtn" onclick="openLoginModal()" class="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white text-sm font-bold rounded-lg hover:bg-blue-600 transition-all shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                Technician Login
            </button>
        </div>

        <!-- ADMIN PANEL -->
        <div id="adminPanel" style="display: none;" class="mb-8 p-6 bg-gradient-to-r from-blue-900 to-indigo-900 text-white rounded-2xl shadow-xl border border-blue-800">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="text-center md:text-left">
                    <h3 class="text-xl font-bold flex items-center gap-2 justify-center md:justify-start">
                        <span class="p-1 bg-blue-500/20 rounded">🛠️</span>
                        Technician Dashboard
                    </h3>
                    <p class="text-blue-200 text-sm mt-1">Control your public availability status</p>
                </div>
                <div class="flex flex-wrap items-center justify-center gap-3">
                    <button id="statusToggleBtn" onclick="toggleStatus()" class="px-8 py-3 bg-white text-blue-900 font-black rounded-xl hover:bg-blue-50 transition-all shadow-lg">
                        Switch Status
                    </button>
                    <button onclick="logout()" class="px-5 py-3 bg-blue-800/50 text-blue-100 text-sm font-bold rounded-xl hover:bg-red-500/20 hover:text-red-200 transition-all border border-blue-700">
                        Logout
                    </button>
                </div>
            </div>
        </div>

        <!-- LOGIN MODAL -->
        <div id="loginModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 9999;">
            <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-200">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🔐</div>
                <h2 class="text-2xl font-black text-slate-900 mb-2 text-center">Technician Access</h2>
                <p class="text-slate-500 text-center mb-6 text-sm">Enter your secret passcode</p>
                
                <div class="space-y-4">
                    <input type="password" id="passcodeInput" placeholder="••••" class="w-full px-4 py-4 text-center text-2xl rounded-xl border-2 border-slate-100 focus:border-blue-500 outline-none font-mono">
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg">
                        Unlock Dashboard
                    </button>
                    <button onclick="closeLoginModal()" class="w-full text-slate-400 text-sm font-bold hover:text-slate-600 py-2">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <header class="mb-10 text-center">
            <h1 class="text-5xl font-black text-slate-900 mb-3 tracking-tight">IT Helpdesk</h1>
            <p class="text-lg text-slate-500 max-w-md mx-auto leading-relaxed">Submit a ticket and we'll get back to you as soon as possible.</p>
        </header>

        <!-- Ticket Form -->
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-8 sm:p-12">
                <form id="ticketForm" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                            <input type="text" id="name" required class="w-full px-5 py-4 rounded-xl bg-slate-50 border-transparent focus:bg-white focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                            <input type="email" id="email" required class="w-full px-5 py-4 rounded-xl bg-slate-50 border-transparent focus:bg-white focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Issue Type</label>
                        <select id="issue_type" required class="w-full px-5 py-4 rounded-xl bg-slate-50 border-transparent focus:bg-white focus:border-blue-500 outline-none">
                            <option value="">Select an issue type</option>
                            <option value="hardware">Hardware Issue</option>
                            <option value="software">Software Issue</option>
                            <option value="network">Network/Internet</option>
                            <option value="access">Access/Password Reset</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Subject</label>
                        <input type="text" id="subject" required class="w-full px-5 py-4 rounded-xl bg-slate-50 border-transparent focus:bg-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Description</label>
                        <textarea id="description" rows="5" required class="w-full px-5 py-4 rounded-xl bg-slate-50 border-transparent focus:bg-white focus:border-blue-500 outline-none"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-5 px-8 rounded-2xl shadow-xl hover:bg-blue-700">
                        Submit Support Ticket
                    </button>
                </form>
                <div id="statusMessage" class="mt-8 hidden p-6 rounded-2xl font-bold text-center border-2"></div>
            </div>
        </div>

        <footer class="mt-16 text-center text-slate-400 text-sm font-medium">
            <p>&copy; 2024 IT Helpdesk System. Built with Supabase & Tailwind.</p>
        </footer>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://sruzjqxxvjkzzsfopzwu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydXpqcXh4dmprenpzZm9wend1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzOTQ5NjMsImV4cCI6MjA5MTk3MDk2M30.T_8RwXa6XbS6HOIowZqt5hm5BeLD_tnpbv_OwILqcw8';
        const TECH_PASSCODE = '1234'; // CHANGE THIS

        // Initialize Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentStatus = 'available';

        // Functions defined globally to ensure they are accessible
        window.openLoginModal = function() {
            document.getElementById('loginModal').style.display = 'flex';
        };

        window.closeLoginModal = function() {
            document.getElementById('loginModal').style.display = 'none';
        };

        window.handleLogin = function() {
            const input = document.getElementById('passcodeInput').value.trim();
            if (input === TECH_PASSCODE) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('passcodeInput').value = '';
            } else {
                alert('Incorrect Passcode!');
            }
        };

        window.logout = function() {
            document.getElementById('adminPanel').style.display = 'none';
        };

        window.toggleStatus = async function() {
            const newStatus = currentStatus === 'available' ? 'busy' : 'available';
            const { error } = await supabase
                .from('technician_status')
                .upsert({ id: 1, status: newStatus, updated_at: new Date().toISOString() });

            if (!error) {
                currentStatus = newStatus;
                updateUI();
            } else {
                alert('Error updating status: ' + error.message);
            }
        };

        function updateUI() {
            const text = document.getElementById('publicStatusText');
            const dot = document.getElementById('publicStatusDot');
            if (currentStatus === 'available') {
                text.textContent = 'AVAILABLE';
                text.className = 'font-bold text-green-700 text-sm';
                dot.className = 'status-dot available';
            } else {
                text.textContent = 'BUSY';
                text.className = 'font-bold text-red-600 text-sm';
                dot.className = 'status-dot busy';
            }
        }

        async function loadStatus() {
            const { data } = await supabase.from('technician_status').select('status').eq('id', 1).single();
            if (data) {
                currentStatus = data.status;
                updateUI();
            }
        }

        // Ticket Logic
        document.getElementById('ticketForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            const { error } = await supabase.from('tickets').insert([{
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                issue_type: document.getElementById('issue_type').value,
                subject: document.getElementById('subject').value,
                description: document.getElementById('description').value,
                status: 'open'
            }]);

            const msg = document.getElementById('statusMessage');
            msg.classList.remove('hidden');
            if (!error) {
                msg.textContent = 'Success!';
                msg.className = 'mt-8 p-6 rounded-2xl bg-green-50 text-green-800 border-green-200';
                e.target.reset();
            } else {
                msg.textContent = 'Error: ' + error.message;
                msg.className = 'mt-8 p-6 rounded-2xl bg-red-50 text-red-800 border-red-200';
            }
            btn.disabled = false;
            btn.textContent = 'Submit Support Ticket';
        };

        loadStatus();
    </script>
</body>
</html>
